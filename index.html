<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký nhận thông tin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #222;
      padding: 40px 48px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 0.95rem;
      color: #444;
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px 40px;
      max-width: 1100px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full-width {
      grid-column: 1 / 2;
    }

    label {
      font-weight: 700;
      font-size: 0.9rem;
      color: #222;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid #ccc;
      border-radius: 2px;
      font-size: 0.9rem;
      color: #999;
      background: #fff;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder,
    input[type="tel"]::placeholder {
      color: #aaa;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    select:focus {
      border-color: #888;
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-75%) rotate(45deg);
      width: 8px;
      height: 8px;
      border-right: 2px solid #444;
      border-bottom: 2px solid #444;
      pointer-events: none;
    }

    .select-wrapper select {
      color: #444;
      cursor: pointer;
    }

    .checkbox-row {
      grid-column: 1 / -1;
      margin-top: 4px;
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      border: 1px solid #ccc;
    }

    .checkbox-group label {
      font-weight: normal;
      font-size: 0.9rem;
      color: #222;
      cursor: pointer;
    }

    .submit-btn {
      margin-top: 28px;
      padding: 14px 40px;
      background: #003087;
      color: #fff;
      border: none;
      border-radius: 2px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #002070;
    }
  </style>
</head>
<body>
  <h1>Đăng ký nhận thông tin</h1>
  <p class="section-label">Thông tin liên hệ</p>

  <form>
    <div class="form-grid">
      <!-- Row 1 -->
      <div class="form-group">
        <label for="full-name">Họ và Tên*:</label>
        <input type="text" id="full-name" name="full-name" placeholder="Nhập tên của bạn">
      </div>
      <div class="form-group">
        <label for="phone">Số điện thoại*:</label>
        <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại của bạn">
      </div>

      <!-- Row 2 -->
      <div class="form-group">
        <label for="email">Email*:</label>
        <input type="email" id="email" name="email" placeholder="Nhập email của bạn (nếu có)">
      </div>
      <div class="form-group">
        <label for="insurance">Số hợp đồng bảo hiểm:</label>
        <input type="text" id="insurance" name="insurance" placeholder="Nhập số hợp đồng bảo hiểm">
      </div>

      <!-- Row 3 -->
      <div class="form-group">
        <label for="sms">Tin nhắn SMS</label>
        <div class="select-wrapper">
          <select id="sms" name="sms">
            <option value="">----</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="dien-thoai">Điện thoại</label>
        <div class="select-wrapper">
          <select id="dien-thoai" name="dien-thoai">
            <option value="">----</option>
          </select>
        </div>
      </div>

      <!-- Row 4 -->
      <div class="form-group">
        <label for="email-contact">Email</label>
        <div class="select-wrapper">
          <select id="email-contact" name="email-contact">
            <option value="">----</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="my-sun-life">my Sun Life</label>
        <div class="select-wrapper">
          <select id="my-sun-life" name="my-sun-life">
            <option value="">----</option>
          </select>
        </div>
      </div>

      <!-- Row 5: Mạng Xã Hội (left column only) -->
      <div class="form-group full-width">
        <label for="mang-xa-hoi">Mạng Xã Hội</label>
        <div class="select-wrapper">
          <select id="mang-xa-hoi" name="mang-xa-hoi">
            <option value="">----</option>
          </select>
        </div>
      </div>

      <!-- Row 6: Checkbox -->
      <div class="checkbox-row">
        <div class="checkbox-group">
          <input type="checkbox" id="consent" name="consent">
          <label for="consent">Tôi đồng ý với các điều khoản và điều kiện</label>
        </div>
      </div>
    </div>

    <button type="submit" class="submit-btn">Đăng ký</button>
  </form>
</body>
</html>
